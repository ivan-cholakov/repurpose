name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
      # All raw outputs, so the docker job can look up per-component versions
      # (root path "." is unprefixed; other paths are "<path>--version").
      release_outputs: ${{ toJson(steps.release.outputs) }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # After every release, build and push a Docker image per released component.
  docker:
    name: Publish image (${{ matrix.path }})
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        path: ${{ fromJson(needs.release-please.outputs.paths_released) }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image name and version
        id: meta
        env:
          RELEASE_OUTPUTS: ${{ needs.release-please.outputs.release_outputs }}
          COMPONENT_PATH: ${{ matrix.path }}
        run: |
          if [ "$COMPONENT_PATH" = "." ]; then
            name="${GITHUB_REPOSITORY#*/}"
            version=$(jq -r '.version' <<< "$RELEASE_OUTPUTS")
          else
            name=$(basename "$COMPONENT_PATH")
            version=$(jq -r --arg p "$COMPONENT_PATH" '.[$p + "--version"]' <<< "$RELEASE_OUTPUTS")
          fi
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER}/${name}"
          image=$(tr '[:upper:]' '[:lower:]' <<< "$image")
          {
            echo "image=$image"
            echo "version=$version"
            echo "major_minor=${version%.*}"
            echo "major=${version%%.*}"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.path }}
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.major_minor }}
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.major }}
            ${{ steps.meta.outputs.image }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=docker-${{ matrix.path }}
          cache-to: type=gha,scope=docker-${{ matrix.path }},mode=max
