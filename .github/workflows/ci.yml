name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, build, audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Biome (lint + format)
        run: pnpm check:ci
      - name: TypeScript
        run: pnpm typecheck
      - name: Build
        run: pnpm build
        env:
          AUTH_SECRET: ci-build-secret-please-rotate-0123456789
      - name: Audit (high/critical)
        run: pnpm audit --audit-level=high

  e2e:
    name: End-to-end tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright (Chromium)
        run: pnpm exec playwright install --with-deps chromium
      - name: Prepare env + database
        run: |
          cp .env.example .env
          pnpm db:migrate
      - name: Run Playwright (desktop + mobile)
        run: pnpm test:e2e
        env:
          AUTH_SECRET: ci-e2e-secret-please-rotate-0123456789
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
