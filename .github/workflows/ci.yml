name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, build, audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Biome (lint + format)
        run: pnpm check:ci
      - name: TypeScript
        run: pnpm typecheck
      - name: Build
        run: pnpm build
        env:
          AUTH_SECRET: ci-build-secret-please-rotate-0123456789
      - name: Audit (high/critical)
        run: pnpm audit --audit-level=high

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      # Build only — release-please's workflow pushes on release. Shares the
      # release job's cache scope so release builds start warm.
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          cache-from: type=gha,scope=docker-.
          cache-to: type=gha,scope=docker-.,mode=max

  e2e:
    name: End-to-end tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright (Chromium)
        run: pnpm exec playwright install --with-deps chromium
      - name: Prepare env + database
        run: |
          cp .env.example .env
          pnpm db:migrate
      - name: Run Playwright (desktop + mobile)
        run: pnpm test:e2e
        env:
          AUTH_SECRET: ci-e2e-secret-please-rotate-0123456789
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
